# This properties allows to detect low performance with limited allowed memory
openl.perf.mavenOpts = ${jacoco.argLine} -Xms16m -Xmx96m -XX:MaxMetaspaceSize=192m

# Run openl:migrate over the whole reactor (5 modules) before the normal verify lifecycle.
# Dry-run skips SCM commits — this fixture has no git repository — but the migrator still applies its
# in-memory transforms, so verify.groovy can assert MigrateMojo#isDisabled() only lets the two
# 'openl' packaging modules through and skips the parent pom + the two jar integration modules.
invoker.goals = clean openl:migrate -Dopenl.migrate.dryRun=true verify
