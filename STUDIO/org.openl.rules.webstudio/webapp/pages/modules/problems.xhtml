<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:c="http://java.sun.com/jsp/jstl/core"
        xmlns:ui="http://java.sun.com/jsf/facelets">

    <c:set var="contextPath" value="#{facesContext.externalContext.request.contextPath}"/>

    <style>
        .panel-header {
            padding-left: 24px
        }

        .message-panel {
            float: left;
            padding-right: 10px;
        }

        .info-panel {
            padding-left: 25px
        }

        .message-block {
            margin-bottom: 3px;
            padding: 2px 3px;
        }

        .message-block:hover {
            background-color: lightgrey;
        }

        .message-panel-text{
            vertical-align: top;
        }

        .message-block-link{
            color: black;
            text-decoration:none;
            cursor:pointer;
        }

        .ui-layout-resizer-closed .layout-extractable-info{
            padding-left: 25px
        }

        .ui-layout-resizer-south .layout-extractable-info{
            line-height: 20px;
        }

        .ui-layout-resizer-south-closed {
            height: 20px !important;
            font-size: inherit !important;
            background: #ffffff;
        }

        #problems-panel-container > div:nth-child(1) {
            display: none;
        }
    </style>

    <div class="panel">
        <div class="panel-header container">
            <div class="info-panel layout-extractable-info">
                <div id="errors-info-panel" class='message-panel'>
                    <span class="message-panel-text">Errors:</span>
                    <span id="errors-count" class='badge badge-error'/>
                </div>
                <div id="warnings-info-panel" class='message-panel'>
                    <span class="message-panel-text">Warnings:</span>
                    <span id="warnings-count" class='badge badge-warning'/>
                </div>
                <div id="progress-info-panel" style="display: none" class='messagePanel'/>
            </div>
        </div>

        <div id="problems-panel-container" class="panel-body container">
            <div>
                <div class="message-block {messageTypeClass} problem-small">
                    <a class="message-block-link"
                       onclick="navigateProblem(this); return false;"
                       data-message-id="{messageId}">{messageSummary}</a>
                </div>
            </div>
            <div id="errors-panel"></div>
            <div id="warnings-panel"></div>
        </div>

        <script>
            //<![CDATA[
                // `var` at the top level lets the same script re-evaluate cleanly when the
                // bottom panel is re-injected via jQuery.html() — `const`/`let` would throw
                // on redeclaration in the unchanged global scope.
                var $jq = jQuery.noConflict();
                var projectId = "#{studio.currentProjectId}";

                if (projectId) {
                    ws.projectStatus.whenReady(function () {
                        // Cancel any previous panel subscription (left-over from a prior project/module nav).
                        if (globalThis.__projectStatusSubscription) {
                            globalThis.__projectStatusSubscription.unsubscribe();
                            globalThis.__projectStatusSubscription = null;
                        }

                        globalThis.openl.projectStatus.fetch(projectId)
                            .then(function (status) {
                                renderProjectStatus(status);
                                globalThis.__projectStatusSubscription = globalThis.openl.projectStatus.subscribe(
                                    projectId,
                                    status.branch || null,
                                    renderProjectStatus
                                );
                            })
                            .catch(function () { /* ignore — status panel is best-effort */ });
                    });
                }

                function renderProjectStatus(status) {
                    const compileState = status.compileState;
                    const compilation = status.compilation || {};
                    const modules = compilation.modules || { total: 0, compiled: 0 };
                    const messageSummary = compilation.messages || { items: [], errors: 0, warnings: 0 };

                    if (modules.total > 0) {
                        updateProgressPanel(modules, compileState === 'compiling');
                    }
                    if (compileState === 'compiling') {
                        inProgress();
                    } else {
                        renderMessages(messageSummary);
                        finished();
                        ws.nav.reloadPanel('left');
                    }
                }

                function updateProgressPanel(modules, stillCompiling) {
                    const total = modules.total || 0;
                    const compiled = modules.compiled || 0;
                    let percent = total === 0 ? 0 : Math.round(compiled / total * 100);
                    if (stillCompiling && compiled === total && total !== 0) {
                        // Hold the bar one tick short of 100% while we still see `compiling`.
                        percent--;
                    }
                    $jq('#progress-info-panel').text("Loaded " + percent + "% (" + compiled + "/" + total + ")");
                }

                function renderMessages(messageSummary) {
                    const errorsCount = messageSummary.errors || 0;
                    const warningsCount = messageSummary.warnings || 0;
                    $jq('#errors-info-panel').toggle(errorsCount !== 0);
                    $jq('#errors-count').text(errorsCount);
                    $jq('#warnings-info-panel').toggle(warningsCount !== 0);
                    $jq('#warnings-count').text(warningsCount);

                    const warningsPanel = $j("#warnings-panel");
                    const errorsPanel = $j("#errors-panel");
                    warningsPanel.empty();
                    errorsPanel.empty();
                    const items = messageSummary.items || [];
                    if (items.length === 0) {
                        return;
                    }
                    const htmlTemplate = $j('#problems-panel-container>div:nth-child(1)').clone().html();
                    items.forEach(function (item) {
                        const newMessageHtml = htmlTemplate
                            .replaceString(/{messageId}/g, item.id)
                            .replaceString(/{messageSummary}/g, ws.utils.escapeHtml(item.summary));
                        if (item.severity === 'WARN') {
                            warningsPanel.append(newMessageHtml.replaceString(/{messageTypeClass}/g, 'problem-warning'));
                        } else if (item.severity === 'ERROR') {
                            errorsPanel.append(newMessageHtml.replaceString(/{messageTypeClass}/g, 'problem-error'));
                        }
                    });
                }

                function inProgress() {
                    $jq('#progress-info-panel').attr("data-compilation-status", "inProgress");
                    $jq('#progress-info-panel').show();
                    ws.ui.problems.show();
                }

                function finished() {
                    $jq('#progress-info-panel').attr("data-compilation-status", "finished");
                    const timestamp = Date.now();
                    $jq('#progress-info-panel').attr("data-compilation-finished", timestamp);
                    setTimeout(function() {
                       const requiredProgressPanel =
                            $j("#progress-info-panel[data-compilation-status='finished'][data-compilation-finished='" + timestamp + "']");
                       if (requiredProgressPanel.length > 0 ) {
                            requiredProgressPanel.hide();
                            requiredProgressPanel.text(requiredProgressPanel.text()); // To trigger observer
                            if ($jq('#warnings-count').text() == 0 && $jq('#errors-count').text() == 0) {
                                ws.ui.problems.hide()
                            }
                       }
                    }, 10000);
                }

                function navigateProblem(problemBlock) {
                    const $j = jQuery.noConflict();
                    const problem = $j(problemBlock);
                    $j.ajax({
                        url: "#{contextPath}/web/message/" + problem.attr("data-message-id") + "/url",
                        datatype: "text"
                    })
                    .done(function (data) {
                       document.location.href = data;
                    });
                }
            //]]>
        </script>
    </div>

</ui:composition>
