<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:a4j="http://richfaces.org/a4j"
    xmlns:rich="http://richfaces.org/rich">

    <rich:popupPanel id="modalAddUser" minWidth="530" autosized="true">
        <f:facet name="header">
            <h:outputText value="Add New User" />
        </f:facet>

        <f:facet name="controls">
            <h:graphicImage value="/images/close.gif" class="close"
                onclick="hideAddUser()" alt="Close" />
        </f:facet>

        <h:form id="addUserForm">
        <div style="max-height: 370px; overflow: auto;">
            <h:panelGrid id="addUserGroupsDiv" columns="3" cellspacing="5">
                <h:panelGroup><label>Local user</label></h:panelGroup>
                <h:selectBooleanCheckbox id="internalUser"/>
                <h:panelGroup/>

                <label class="required">Username:</label>
                <h:inputText id="username"/>
                <a4j:outputPanel ajaxRendered="true" id="nameError">
                    <h:message for="username" styleClass="error" />
                </a4j:outputPanel>

                <h:panelGroup><label class="required">Password:</label></h:panelGroup>
                <h:inputSecret id="password"/>
                <a4j:outputPanel ajaxRendered="true" id="passwordError">
                    <h:message for="password" styleClass="error" />
                </a4j:outputPanel>

                <label>Given Name:</label>
                <h:inputText id="firstName" />
                <a4j:outputPanel ajaxRendered="true" id="firstNameError">
                    <h:message for="firstName" styleClass="error" />
                </a4j:outputPanel>

                <label>Family Name:</label>
                <h:inputText id="lastName"/>
                <a4j:outputPanel ajaxRendered="true" id="lastNameError">
                    <h:message for="lastName" styleClass="error" />
                </a4j:outputPanel>

                <label>Email:</label>
                <h:inputText id="email"/>
                <a4j:outputPanel ajaxRendered="true" id="emailError">
                    <h:message for="email" styleClass="error" />
                </a4j:outputPanel>
            </h:panelGrid>
            </div>

            <footer>
                <input id="saveUser" type="button" title="Save" value="Save" class="button-primary"/>
                <input type="button" value="Cancel" onclick="hideAddUser()" />
            </footer>
        </h:form>

    </rich:popupPanel>

    <script>
        //<![CDATA[
        $j(function () {
            initAddUserPage();
        });

        function initAddUserPage() {
            $j("#saveUser").on("click", function (e) {
                e.preventDefault();
                var groupValues = [];
                for (let i = 1; i < $j("#addUserForm :checked").size(); i++) {
                    groupValues.push($j("#addUserForm :checked")[i].value);
                }
                $j.ajax({
                    type: "POST",
                    url: "#{contextPath}/web/user",
                    data: JSON.stringify({
                        username : $j("#addUserForm\\:username").val(),
                        firstName : $j("#addUserForm\\:firstName").val(),
                        lastName : $j("#addUserForm\\:lastName").val(),
                        email : $j("#addUserForm\\:email").val(),
                        password : $j("#addUserForm\\:password").val(),
                        internalUser : $j("#addUserForm\\:internalUser").is(":checked"),
                        groups : groupValues
                    }),
                    contentType: 'application/json',
                    dataType: 'json'
                })
                    .done(function () {
                        $j('#userListForm').trigger('refresh');
                        location.reload();
                        hideAddUser();
                    });
            });
        }

        $j(function () {
            $j.ajax({
                type: "GET",
                url: "#{contextPath}/web/admin/management/groups",
                datatype: "json"
            })
                .done(function (data) {
                    var groupListBlock = document.getElementById('addUserForm:addUserGroupsDiv');
                    var el = document.createElement("TR");
                    var html = '<td><label>Groups:</label></td><td><table><tbody>';
                    $j.map(data, function (val, i) {
                        html += '<tr><td><input value="' + i + '" type="checkbox"/>' +
                            '<label class=""> ' + i + ' </label></td></tr>';
                    });
                    html += '</tbody></table></td>';
                    el.innerHTML = html;
                    groupListBlock.append(el);
                });

            $j.ajax({
                type: "GET",
                url: "#{contextPath}/web/user/options",
                datatype: "json"
            })
                .done(function (data) {
                    $j("#addUserForm\\:password").closest('tr').toggle(data.canCreateInternalUsers);
                    $j("#addUserForm\\:password").prop('disabled', !data.canCreateInternalUsers);
                    $j("#addUserForm\\:internalUser").closest('tr').toggle(data.canCreateInternalUsers && data.canCreateExternalUsers);
                    document.getElementById('addUserForm:internalUser').checked = data.canCreateInternalUsers;
                });
        });

        function hideAddUser() {
            RichFaces.$("modalAddUser").hide();

            $j("#addUserForm\\:nameError,#addUserForm\\:passwordError,#addUserForm\\:firstNameError,#addUserForm\\:lastNameError,#addUserForm\\:groupsError").text("");

            // Reset form
            $j("#addUserForm")[0].reset();
            $j("#addUserForm\\:internalUser").change();
        }

        (function () {
            $j("#addUserForm\\:internalUser").change(function () {
                // Disable and hide the password field if user isn't Internal (enable and show otherwise)
                var internalUser = $j(this).attr("checked") === 'checked';
                $j("#addUserForm\\:password").prop('disabled', !internalUser);
                $j("#addUserForm\\:password").closest('tr').toggle(internalUser);
            });

            // internalUser can be absent. jQuery in this case does nothing. Don't replace with direct function invocation.
            $j("#addUserForm\\:internalUser").change();
        })();
        //]]>
    </script>

</ui:composition>
