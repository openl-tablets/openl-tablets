<?xml version="1.0" encoding="UTF-8"?>
<ui:composition
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:rich="http://richfaces.org/rich">

    <style>
        #userGroups>div:nth-child(1) {
            display: none;
        }
        #groupsRow {
            display: none;
        }
        #localUserRow {
            display: none;
        }
        #passwordRow {
            display: none;
        }
        #addUserTable {
            max-height: 370px;
            overflow: auto;
        }
    </style>

    <rich:popupPanel id="modalAddUser" minWidth="530" autosized="true">
        <f:facet name="header">
            <h:outputText value="Add New User" />
        </f:facet>

        <f:facet name="controls">
            <h:graphicImage value="/images/close.gif" class="close"
                onclick="hideAddUser()" alt="Close" />
        </f:facet>

        <table id="addUserTable" cellspacing="5">
            <tr id="localUserRow">
                <td><label id="internalUser_label">Local user</label></td>
                <td><input id="internalUser_field" type="checkbox"/></td>
                <td><span id="internalUser_error" class="error"></span></td>
            </tr>
            <tr>
                <td><label id="username_label" class="required">Username:</label></td>
                <td><input id="username_field" type="text"/></td>
                <td><span id="username_error" class="error"></span></td>
            </tr>
            <tr id="passwordRow">
                <td><label id="password_label" class="required">Password:</label></td>
                <td><input id="password_field" type="password"/></td>
                <td><span id="password_error" class="error"></span></td>
            </tr>
            <tr>
                <td><label id="firstName_label">First name:</label></td>
                <td><input id="firstName_field" type="text"/></td>
                <td><span id="firstName_error" class="error"></span></td>
            </tr>
            <tr>
                <td><label id="lastName_label">Last name:</label></td>
                <td><input id="lastName_field" type="text"/></td>
                <td><span id="lastName_error" class="error"></span></td>
            </tr>
            <tr>
                <td><label id="email_label">Email:</label></td>
                <td><input id="email_field" type="text"/></td>
                <td><span id="email_error" class="error"></span></td>
            </tr>
            <tr id="groupsRow">
                <td><label id="groups_label">Groups:</label></td>
                <td id="userGroups">
                    <div id="groups_field">
                        <input value="{groupValue}" type="checkbox"/>
                        <label class="">{groupName}</label>
                    </div>
                </td>
                <td><span id="groups_error" class="error"></span></td>
            </tr>
        </table>

        <footer>
            <input id="saveUser" type="button" title="Save" value="Save" class="button-primary"/>
            <input type="button" value="Cancel" onclick="hideAddUser()" />
        </footer>

    </rich:popupPanel>

    <script>
        //<![CDATA[

        $j("#internalUser_field").change(function () {
            $j("#passwordRow").toggle($j(this).attr("checked") === 'checked');
        });

        $j("#saveUser").click(function (e) {
            e.preventDefault();
            var groupValues = [];
            $j("#groupsRow input:checkbox").each(function() {
                if ($j(this).is(":checked")) {
                    groupValues.push($j(this).val());
                }
            });
            $j.ajax({
                type: "POST",
                url: "#{contextPath}/web/user",
                data: JSON.stringify({
                    username : $j("#username_field").val(),
                    firstName : $j("#firstName_field").val(),
                    lastName : $j("#lastName_field").val(),
                    email : $j("#email_field").val(),
                    password : $j("#password_field").val(),
                    internalUser : $j("#internalUser_field").is(":checked"),
                    groups : groupValues
                }),
                contentType: 'application/json',
                dataType: 'json'
            })
            .done(function () {
                location.reload();
                hideAddUser();
            });
        });

        $j.ajax({
            type: "GET",
            url: "#{contextPath}/web/admin/management/groups",
            datatype: "json"
        })
        .done(function (data) {
            const rowTemplate = $j('#userGroups>div:nth-child(1)');
            const htmlTemplate = $j('<div/>').append(rowTemplate.clone()).html();
            let groups = "";
            $j.map(data, function (val, i) {
                $j("#groupsRow").show();
                groups += htmlTemplate.replace(/{groupValue}/g, i).replace(/{groupName}/g, i);
            });

            $j("#userGroups").html(htmlTemplate + groups);
        });

        $j.ajax({
            type: "GET",
            url: "#{contextPath}/web/user/options",
            datatype: "json"
        })
        .done(function (data) {
            $j("#passwordRow").toggle(data.canCreateInternalUsers);
            $j("#internalUserRow").toggle(data.canCreateInternalUsers || data.canCreateExternalUsers);
            $j("#internalUser_field").prop("checked", data.canCreateInternalUsers);
        });

        $j("#internalUser_field").change();

        function hideAddUser() {
            RichFaces.$("modalAddUser").hide();
            $j("#internalUser_error,#username_error,#password_error,#firstName_error,#lastName_error,#email_error,#groups_error").text("");
            $j("#internalUser_field").change();
        }

        //]]>
    </script>

</ui:composition>
