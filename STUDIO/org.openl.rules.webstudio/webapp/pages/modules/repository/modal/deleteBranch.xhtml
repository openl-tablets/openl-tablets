<ui:composition
        xmlns:ui="http://java.sun.com/jsf/facelets">

    <script>
        //<![CDATA[

        // Opens the React delete-branch modal (mounted by studio-ui in #appRoot).
        // The main branch is supplied by the RichFaces controller; the modified and
        // merged-into-main flags are resolved inside the modal through the projects and
        // merge REST APIs. On success the modal calls designRepoRefresh to refresh the
        // tree in place, keeping the success notification visible.
        function openDeleteBranchDialog(repositoryId, projectName, branch, mainBranch) {
            globalThis.dispatchEvent(new CustomEvent('openDeleteBranchModal', {
                detail: {
                    repositoryId: repositoryId,
                    projectName: projectName,
                    branch: branch,
                    mainBranch: mainBranch,
                    onSuccess: designRepoRefresh
                }
            }));
        }

        //]]>
    </script>
</ui:composition>
