project.table.graph.direction.desc = Relations to include.
project.table.graph.depth.desc = Maximum traversal depth from the table.

project.table.update.summary = Update project table
project.table.update.desc = Update the table in the currently opened project. If the table had no room to grow and was relocated, its ID changes and the new ID is returned in the response body together with the new table URL in the `Location` header.
project.table.update.200.desc = Table updated and relocated. The response body carries the new table ID and the `Location` header points to the table under its new ID.
project.table.update.204.desc = Table updated without changing its ID.
project.table.append.summary = Append project table
project.table.append.desc = Append lines to the table in the currently opened project. If the table had no room to grow and was relocated, its ID changes and the new ID is returned in the response body together with the new table URL in the `Location` header.
project.table.append.200.desc = Lines appended and the table relocated. The response body carries the new table ID and the `Location` header points to the table under its new ID.
project.table.append.204.desc = Lines appended without changing the table ID.
project.table.actions.summary = Edit project table source
project.table.actions.desc = Apply a single edit to the raw source of the table in the currently opened project. The operation is selected by the `operation` field of the request body: append, insert or delete a row or a column, update a cell, row or column, or merge or unmerge a range of cells. The table is always handled in the raw format regardless of its type. If the table had no room to grow and was relocated, its ID changes and the new ID is returned in the response body together with the new table URL in the `Location` header.
project.table.actions.200.desc = Edit applied and the table relocated. The response body carries the new table ID and the `Location` header points to the table under its new ID.
project.table.actions.204.desc = Edit applied without changing the table ID.
project.table.delete.summary = Delete project table
project.table.delete.desc = Delete the table from the currently opened project. The whole table area is cleared from the sheet regardless of the table type, so the table no longer exists once the project is recompiled.
project.table.delete.204.desc = Table deleted.

