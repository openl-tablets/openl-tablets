# Trace API
trace.start.summary = Start trace execution
trace.start.desc = Starts an interactive debug session for a table and runs it to the first suspension - the table entry when stopAtEntry is true, otherwise the first breakpoint that is hit. Any active session for the project is terminated first, and the call returns the initial execution stack once the worker suspends.\n\
  \n\
  A test table runs the cases selected by the testRanges parameter (e.g. "1-3,5" runs cases 1, 2, 3 and 5). Any other method runs with the parameters from the request body, given either as the raw parameters or as a structured object with `params` and `runtimeContext`:\n\
  ```json\n\
  {\n\
    "params": [param1, param2, ...],\n\
    "runtimeContext": { ... }\n\
  }\n\
  ```



trace.cancel.summary = Cancel trace execution
trace.cancel.desc = Terminates the active debug session and releases its resources. The worker is stopped if it is still running, and the frozen variables and cached parameter values are cleared. The project and its files are not affected.
trace.cancel.204.desc = Trace execution cancelled and data cleared successfully.

trace.get-parameter.summary = Get lazy parameter value
trace.get-parameter.desc = Returns the full JSON value of a lazy-loaded parameter. Large values (complex objects, big arrays) are not inlined in the frame variables; each one is assigned a parameterId and marked lazy, then fetched on demand through this operation.
trace.get-parameter.200.desc = Complete parameter value with JSON data and schema information.



trace.param.table-id.desc = Unique identifier of the table to trace. Use the table's ID from the project tables list.
trace.param.test-ranges.desc = Comma-separated test case ranges for TestSuiteMethod execution.\n\
  \n\
  **Examples:**\n\
  * `1` - Execute only test case 1\n\
  * `1-5` - Execute test cases 1 through 5\n\
  * `1-3,5,7-9` - Execute test cases 1, 2, 3, 5, 7, 8, 9\n\
  \n\
  **Note:** Only applicable for TestSuiteMethod tables. Ignored for regular method tables.
trace.param.from-module.desc = Optional module name to execute the trace within a specific module context.\n\
  \n\
  When specified:\n\
  * The table is located within the specified module\n\
  * The trace uses the opened module's runtime context\n\
  \n\
  When omitted:\n\
  * The table is located across all project modules\n\
  * The trace uses the full project context
trace.param.input-json.desc = Input parameters for regular method execution in JSON format.\n\
  \n\
  **Supported formats:**\n\
  \n\
  1. **Raw parameter format** - Direct method parameters:\n\
  ```json\n\
  [param1, param2, param3]\n\
  ```\n\
  or for single-parameter methods:\n\
  ```json\n\
  { "field1": "value1", "field2": "value2" }\n\
  ```\n\
  \n\
  2. **Structured format** - Explicit params and runtime context:\n\
  ```json\n\
  {\n\
    "params": [param1, param2],\n\
    "runtimeContext": {\n\
      "currentDate": "2024-01-01",\n\
      "lob": "Commercial"\n\
    }\n\
  }\n\
  ```\n\
  \n\
  **Note:** Not used for TestSuiteMethod tables (use `testRanges` instead).
trace.param.parameter-id.desc = Identifier of a lazy-loaded parameter, as returned in the frame variables when the value is marked lazy.

# Trace model types
trace.type.parameter-value.desc = A parameter, context, or result value of a stack frame, with optional lazy loading for large values.

# Trace model fields

trace.field.param.name.desc = Parameter name (e.g., `driver`, `vehicle`, `policy`).
trace.field.param.description.desc = Human-readable description of the parameter's purpose.
trace.field.param.lazy.desc = Indicates whether the parameter value is lazy-loaded.\n\
  \n\
  When `true`:\n\
  * `value` field is null\n\
  * `parameterId` contains the ID for fetching the full value\n\
  * Use GET `/trace/parameters/{parameterId}` to retrieve the value\n\
  \n\
  When `false`:\n\
  * `value` field contains the complete JSON value\n\
  * `parameterId` is null
trace.field.param.parameter-id.desc = Unique identifier for lazy-loaded parameter.\n\
  \n\
  Only present when `lazy=true`. Use this ID with GET `/trace/parameters/{parameterId}` to fetch the full parameter value.
trace.field.param.value.desc = JSON representation of the parameter value.\n\
  \n\
  * Null when `lazy=true` (use `parameterId` to fetch)\n\
  * Contains the actual JSON value when `lazy=false`\n\
  * Type varies based on the parameter (object, array, primitive, etc.)
trace.field.param.schema.desc = JSON Schema describing the structure of the parameter value.\n\
  \n\
  Used by UI components to:\n\
  * Render appropriate input controls\n\
  * Validate parameter values\n\
  * Display nested object structures\n\
  \n\
  Follows JSON Schema Draft 7 specification.

# Trace debugger (interactive)
trace.start.200.desc = Debug session started. Returns the initial execution stack (suspended at entry, or after running to the first breakpoint).
trace.status.summary = Get debug status
trace.status.desc = Returns the status of the active debug session.
trace.status.200.desc = Current debug session status.
trace.stack.summary = Get execution stack
trace.stack.desc = Returns the live execution stack from the current suspension, ordered from the root call to the current frame.
trace.stack.200.desc = The current execution stack.
trace.step.summary = Step
trace.step.desc = Resumes the suspended session with a step command and returns the new execution stack.
trace.step.200.desc = Execution stack after the step.
trace.resume.summary = Resume
trace.resume.desc = Resumes execution until the next breakpoint or until it finishes. The new state is delivered over WebSocket.
trace.resume.202.desc = Resume accepted.
trace.pause.summary = Pause
trace.pause.desc = Requests an asynchronous suspend at the next safepoint.
trace.pause.202.desc = Pause requested.
trace.get-variables.summary = Get frame variables
trace.get-variables.desc = Freezes and returns the parameters, context, and result of a stack frame. Must be called while the session is suspended.
trace.get-variables.200.desc = Frozen variables of the frame.
trace.get-highlights.summary = Get frame highlights
trace.get-highlights.desc = Returns the cells to highlight on the frame's table (current line, result, matched and unmatched conditions), keyed by A1 address, to overlay on the raw table grid.
trace.get-highlights.200.desc = Highlighted cells for the frame.
trace.get-breakpoints.summary = Get breakpoints
trace.get-breakpoints.desc = Returns the table URIs that currently have a breakpoint.
trace.get-breakpoints.200.desc = Breakpoint table URIs.
trace.set-breakpoints.summary = Set breakpoints
trace.set-breakpoints.desc = Replaces the breakpoint set. Breakpoints persist across runs and apply to a running session immediately.
trace.set-breakpoints.204.desc = Breakpoints updated.
trace.watch.summary = Get watched values
trace.watch.desc = Returns the watched cells' values across the run, one series per cell. Complete once the run has finished.
trace.watch.200.desc = Watched cell values.
trace.get-watches.summary = Get watches
trace.get-watches.desc = Returns the cell names or refs currently watched.
trace.get-watches.200.desc = Watched cell names or refs.
trace.set-watches.summary = Set watches
trace.set-watches.desc = Replaces the watch set. Watches persist across runs and apply on the next start, since a watch captures from the beginning of a run.
trace.set-watches.204.desc = Watches updated.
trace.breakpoint-tables.summary = List breakpoint tables
trace.breakpoint-tables.desc = Returns the rule tables that can be a breakpoint target, so a breakpoint can be set on a table by name before it runs.
trace.breakpoint-tables.200.desc = Rule tables that can be a breakpoint target.
trace.param.stop-at-entry.desc = Suspend at the first frame instead of running to the first breakpoint.
trace.param.profiling.desc = Retain the executed call tree's structure so returned branches can be browsed. Off by default.
trace.param.include-tree.desc = Embed the full executed call tree in the response. On by default; set to false to keep only the bounded profile overview when the whole tree would be too large.
trace.param.profile-top.desc = How many hotspots (slowest tables) the profile overview returns. Defaults to 20.
trace.param.view.desc = Per-frame detail: `full` carries every frame's sub-steps (the UI default); `compact` keeps sub-steps only on the active frame, so a step does not re-send every frame's steps.
trace.param.step-type.desc = Step kind: `into`, `over`, or `out`.
trace.param.frame-index.desc = Stack frame index, 0 for the root call.
trace.type.debug-location.desc = The current line being evaluated inside a stack frame.
trace.type.debug-frame.desc = One frame of the live execution stack.
trace.type.debug-stack.desc = The live execution stack at the current suspension.
trace.type.debug-error.desc = A debug session failure, shaped for non-technical users.
trace.type.debug-variables.desc = Frozen variables of a stack frame.
trace.type.debug-status.desc = Lightweight debug session status.
trace.type.breakpoints.desc = A set of breakpoints by table URI.
trace.type.watches.desc = The set of cells to watch, by name or ref.
