trace.type.watch.desc = The collected values of the watched cells: a factor read across the whole run.
trace.field.watch.series.desc = One series per watched cell (scoped to its table), each with a value per execution.
trace.field.watch.truncated.desc = Whether the capture cap was reached, so some late executions are missing.
