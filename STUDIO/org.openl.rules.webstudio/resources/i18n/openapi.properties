# Run API
run.start.summary = Start run execution
run.start.desc = Initiates an asynchronous run execution for a specified table in the project. The execution runs in the background and its progress is monitored via WebSocket.\n\
  \n\
  This API is designed for executing regular (non-test) methods with user-provided parameters. For test table execution, use the Tests API instead.\n\
  \n\
  **Workflow:**\n\
  1. Cancels any existing run execution for the project\n\
  2. Validates that the specified table exists\n\
  3. Parses input JSON parameters\n\
  4. Creates a run task and executes it asynchronously\n\
  5. Sends status updates via WebSocket\n\
  \n\
  **Input JSON formats:**\n\
  The input JSON can be provided in two formats:\n\
  * **Raw format** - Direct method parameters as JSON array or object\n\
  * **Structured format** - Object with `params` and `runtimeContext` fields:\n\
  ```json\n\
  {\n\
    "params": [param1, param2, ...],\n\
    "runtimeContext": { ... }\n\
  }\n\
  ```
run.start.202.desc = Run execution started successfully. Monitor progress via WebSocket using the project ID and table ID.

run.get-result.summary = Get run execution result
run.get-result.desc = Retrieves the result of the last completed run execution. Supports JSON and XLSX response formats via the `Accept` header.\n\
  \n\
  **JSON response:**\n\
  Returns the execution result with input parameters, runtime context, JSON schema, and any errors.\n\
  \n\
  **XLSX response:**\n\
  Returns the execution result as a downloadable Excel file.
run.get-result.200.desc = Run execution result retrieved successfully.

run.cancel.summary = Cancel run execution
run.cancel.desc = Cancels the currently running execution and clears all run-related data from memory.\n\
  \n\
  **This operation:**\n\
  * Cancels the run execution task if it's still running\n\
  * Clears the result from the registry\n\
  * Does not affect the project or its files
run.cancel.204.desc = Run execution cancelled and data cleared successfully.

run.execution.task.message = No run execution task found.
run.execution.not.completed.message = Run execution is not completed yet.

run.param.table-id.desc = Unique identifier of the table to run. Use the table's ID from the project tables list.
run.param.from-module.desc = Optional module name to execute within a specific module context.\n\
  \n\
  When specified:\n\
  * The table is located within the specified module\n\
  * The execution uses the opened module's runtime context\n\
  \n\
  When omitted:\n\
  * The table is located across all project modules\n\
  * The execution uses the full project context
run.param.input-json.desc = Input parameters for method execution in JSON format.\n\
  \n\
  **Supported formats:**\n\
  \n\
  1. **Raw parameter format** - Direct method parameters:\n\
  ```json\n\
  [param1, param2, param3]\n\
  ```\n\
  or for single-parameter methods:\n\
  ```json\n\
  { "field1": "value1", "field2": "value2" }\n\
  ```\n\
  \n\
  2. **Structured format** - Explicit params and runtime context:\n\
  ```json\n\
  {\n\
    "params": [param1, param2],\n\
    "runtimeContext": {\n\
      "currentDate": "2024-01-01",\n\
      "lob": "Commercial"\n\
    }\n\
  }\n\
  ```
