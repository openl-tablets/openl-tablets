version: '3.9'

services:

  openL_mssql:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: openL_mssql
    hostname: openL_mssql
    networks:
      - openl_net
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=OpenL!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - "vol_mssql:/var/opt/mssql"

  webstudio:
    build:
      context: .
      args:
        "APP": STUDIO/org.openl.rules.webstudio/target/webapp
    container_name: webstudio
    networks:
      - openl_net
    ports:
      - "8181:8080"
      - "5501:5005" # Debug port
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          memory: 512M
    volumes:
      - "vol_openl_studio:/opt/openl/local"
    environment:
      JAVA_OPTS: $JAVA_DEBUG_OPTS

      WEBSTUDIO_CONFIGURED: "true"

      #DB_URL: "jdbc:sqlserver://openL_mssql:1433;databaseName=master;TrustServerCertificate=true"
      #DB_USER: "sa"
      #DB_PASSWORD: "OpenL!Passw0rd"

      USER_MODE: "multi"
      SECURITY_ADMINISTRATORS: "admin"

  ws:
    build:
      context: .
      args:
        "APP": WSFrontend/org.openl.rules.ruleservice.ws/target/webapp
    container_name: ws
    ports:
      - "8182:8080"
      - "5502:5005" # Debug port
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 32M
    environment:
      JAVA_OPTS: $JAVA_DEBUG_OPTS

  ws-all:
    build:
      context: .
      args:
        "APP": WSFrontend/org.openl.rules.ruleservice.ws.all/target/webapp
    container_name: ws-all
    ports:
      - "8183:8080"
      - "5503:5005" # Debug port
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 32M
    environment:
      JAVA_OPTS: $JAVA_DEBUG_OPTS

  demo:
    build:
      context: DEMO
    container_name: demo
    ports:
      - "8184:8080"
      - "5504:5005" # Debug port
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
    environment:
      JAVA_OPTS: $JAVA_DEBUG_OPTS

networks:
  openl_net:
    driver: bridge

volumes:
  vol_mssql:
  vol_openl_studio:
