# Builds the OpenL Tablets DEMO package and verifies that it starts and is
# accessible on Ubuntu, Windows and macOS (EPBDS-16159).
#
# Flow:
#   build  - mvn -DskipTests -T1C, then publish webstudio.war + webservice.war
#   demo   - per OS: place the .war files into DEMO/webapps, run the start script
#            and poll the demo endpoints until they answer with HTTP 200.
name: "DEMO package run & accessibility (Ubuntu, Windows, macOS)"

on:
  # TEMP(validation): run on branch push so the workflow can be triggered before merge. Remove before merge.
  push:
    branches:
      - EPBDS-16159-demo-matrix-test
  schedule:
    # Every week at 03:00 UTC on Wednesday
    - cron: '0 3 * * 3'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: false

concurrency:
  group: demo-package-accessibility-${{ github.event.inputs.branch || github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: Build DEMO .war files
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure GIT
        run: |
          git config --global user.name "OpenL Tablets"
          git config --global user.email openltablets@gmail.com
          git config --global core.autocrlf false

      - name: Checkout ${{ github.event.inputs.branch }}
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'maven'

      - name: Build (skip tests)
        run: mvn -DskipTests -T1C -B "-Dstyle.color=always"

      - name: Create DEMO package
        run: |
          set -euo pipefail
          cp "STUDIO/org.openl.rules.webstudio/target/webstudio.war" "DEMO/webapps/webstudio.war"
          cp "WSFrontend/org.openl.rules.ruleservice.ws/target/webservice.war" "DEMO/webapps/webservice.war"
          echo "LOCAL" > DEMO/openl.version

      - name: Upload DEMO files
        uses: actions/upload-artifact@v7
        with:
          name: demo
          path: DEMO
          retention-days: 3
          if-no-files-found: error

  demo:
    name: DEMO on ${{ matrix.os }}
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download DEMO
        uses: actions/download-artifact@v8
        with:
          name: demo
          path: DEMO

      - name: Run DEMO and check accessibility (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -uo pipefail
          cd DEMO
          chmod +x start
          nohup ./start > demo.log 2>&1 &
          DEMO_PID=$!
          echo "DEMO started, pid=$DEMO_PID"

          cleanup() {
            echo "--- stopping DEMO ---"
            kill "$DEMO_PID" 2>/dev/null || true
            pkill -f 'jetty-home/start.jar' 2>/dev/null || true
          }
          trap cleanup EXIT

          BASE="http://localhost:8080"
          # Endpoints from EPBDS-16159 (ordered light -> heavy; Example3 needs deploy)
          URLS=(
            "$BASE/"
            "$BASE/webstudio"
            "$BASE/webservice"
            "$BASE/webservice/Example3-AutoPolicyCalculation/AccidentPremium"
            "$BASE/webstudio/faces/pages/modules/repository/index.xhtml"
          )

          # Each URL gets its own budget so a slow first-boot can't starve the
          # later (async-deployed) endpoints like Example3.
          PER_URL_TIMEOUT=240
          wait_for() {
            local url="$1" code="000" deadline=$((SECONDS + PER_URL_TIMEOUT))
            while [ "$SECONDS" -lt "$deadline" ]; do
              code=$(curl -s -m 10 -L -o /dev/null -w '%{http_code}' "$url" || echo 000)
              [ "$code" = "200" ] && { echo "  OK   200  $url"; return 0; }
              kill -0 "$DEMO_PID" 2>/dev/null || { echo "  ERR  server process exited  $url"; return 1; }
              sleep 5
            done
            echo "  FAIL last=$code  $url"; return 1
          }

          fail=0
          for u in "${URLS[@]}"; do wait_for "$u" || fail=1; done

          if [ "$fail" -ne 0 ]; then
            echo "::group::demo.log (tail)"; tail -n 200 demo.log || true; echo "::endgroup::"
            exit 1
          fi
          echo "All DEMO endpoints accessible on $(uname -s)."

      - name: Run DEMO and check accessibility (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Location DEMO
          $proc = Start-Process -FilePath 'pwsh' `
            -ArgumentList '-ExecutionPolicy','Bypass','-File','start.ps1' `
            -RedirectStandardOutput "$PWD\demo.out.log" `
            -RedirectStandardError  "$PWD\demo.err.log" `
            -PassThru -WindowStyle Hidden
          Write-Host "DEMO started, pid=$($proc.Id)"

          $base = 'http://localhost:8080'
          $urls = @(
            "$base/",
            "$base/webstudio",
            "$base/webservice",
            "$base/webservice/Example3-AutoPolicyCalculation/AccidentPremium",
            "$base/webstudio/faces/pages/modules/repository/index.xhtml"
          )

          # Each URL gets its own budget (see Linux/macOS step for rationale).
          $perUrlTimeout = 240
          function Wait-Url($url) {
            $code = 0
            $deadline = (Get-Date).AddSeconds($perUrlTimeout)
            while ((Get-Date) -lt $deadline) {
              try {
                $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10 -MaximumRedirection 5
                if ($r.StatusCode -eq 200) { Write-Host "  OK   200  $url"; return $true }
              } catch {
                if ($_.Exception.Response) { $code = $_.Exception.Response.StatusCode.value__ } else { $code = 0 }
              }
              if ($proc.HasExited) { Write-Host "  ERR  server process exited  $url"; return $false }
              Start-Sleep -Seconds 5
            }
            Write-Host "  FAIL last=$code  $url"; return $false
          }

          $fail = $false
          foreach ($u in $urls) { if (-not (Wait-Url $u)) { $fail = $true } }

          # Teardown: stop the launcher and the Jetty JVM it spawned
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Get-CimInstance Win32_Process -Filter "name='java.exe'" |
            Where-Object { $_.CommandLine -like '*jetty-home*' } |
            ForEach-Object { Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue }

          if ($fail) {
            Write-Host "::group::demo log (tail)"
            Get-Content demo.out.log -Tail 200 -ErrorAction SilentlyContinue
            Get-Content demo.err.log -Tail 100 -ErrorAction SilentlyContinue
            Write-Host "::endgroup::"
            exit 1
          }
          Write-Host "All DEMO endpoints accessible on Windows."

      - name: Upload DEMO log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-log-${{ matrix.os }}
          path: |
            DEMO/demo.log
            DEMO/demo.out.log
            DEMO/demo.err.log
          if-no-files-found: ignore
          retention-days: 3
